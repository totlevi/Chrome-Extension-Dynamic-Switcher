<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4c9ffe"/>
      <stop offset="100%" stop-color="#9b59f5"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#g)"/>
  <!-- Three tab cards representing the switcher -->
  <rect x="18" y="48" width="28" height="36" rx="5" fill="rgba(255,255,255,0.25)"/>
  <rect x="50" y="40" width="28" height="44" rx="5" fill="white" opacity="0.9"/>
  <rect x="82" y="48" width="28" height="36" rx="5" fill="rgba(255,255,255,0.25)"/>
  <!-- Arrow symbol on center card -->
  <text x="64" y="70" font-family="system-ui,sans-serif" font-size="22"
        font-weight="bold" fill="#4c9ffe" text-anchor="middle">⇥</text>
</svg>
